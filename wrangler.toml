name = "edgepress-farra"
pages_build_output_dir = "./dist/server"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]

[env.production.vars]
BETTER_AUTH_URL = "https://teu-dominio.com"
[env.preview.vars]
BETTER_AUTH_URL = "http://localhost:4321"

[[d1_databases]]
binding = "DB"
database_name = "edgepress-dev"
database_id = "fbe4ede5-a168-4a33-8570-4c62be8b1c94"
preview_database_id = "378b10ee-5ed7-4c3f-b2f4-66103b74bd9c"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "edgepress_cache"
id = "eb122e65276746228228af8b69d244fa"
preview_id = ""

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "edgepress-media"

[[env.preview.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "edgepress-media-preview"

[observability]
[observability.logs]
enabled = false
invocation_logs = true