name = "edgepress"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"

# Production (default): `wrangler deploy`
[vars]
BETTER_AUTH_URL = "https://edgepress.amb1.workers.dev"
BETTER_AUTH_TRUSTED_ORIGINS = "https://edgepress.amb1.workers.dev"
RATE_LIMIT_LOGIN_MAX = "10"
RATE_LIMIT_LOGIN_WINDOW_MIN = "5"
RATE_LIMIT_REGISTER_MAX = "10"
RATE_LIMIT_REGISTER_WINDOW_MIN = "10"
RATE_LIMIT_UPLOAD_MAX = "100"
RATE_LIMIT_UPLOAD_WINDOW_MIN = "10"
RESEND_FROM = "contato@amb1.io"

[[d1_databases]]
binding = "DB"
database_name = "edgepress"
database_id = "adf7f002-517e-4e53-8a3f-c870226ad418"
preview_database_id = "fbe4ede5-a168-4a33-8570-4c62be8b1c94"
migrations_dir = "./drizzle"

[[kv_namespaces]]
binding = "CACHE"
id = "00ca0b8ef45143f6aede0d5dd2d32e65"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "edgepress-media"

# Preview/staging: `wrangler deploy --env preview`
[env.preview.vars]
BETTER_AUTH_URL = "https://edgepress.amb1.workers.dev"
BETTER_AUTH_TRUSTED_ORIGINS = "https://edgepress.amb1.workers.dev"
RATE_LIMIT_LOGIN_MAX = "10"
RATE_LIMIT_LOGIN_WINDOW_MIN = "5"
RATE_LIMIT_REGISTER_MAX = "10"
RATE_LIMIT_REGISTER_WINDOW_MIN = "10"
RATE_LIMIT_UPLOAD_MAX = "100"
RATE_LIMIT_UPLOAD_WINDOW_MIN = "10"
RESEND_FROM = "contato@amb1.io"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "edgepress-dev"
database_id = "fbe4ede5-a168-4a33-8570-4c62be8b1c94"
migrations_dir = "./drizzle"

[[env.preview.kv_namespaces]]
binding = "CACHE"
id = "00ca0b8ef45143f6aede0d5dd2d32e65"

[[env.preview.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "edgepress-media-preview"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
